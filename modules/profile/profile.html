<!-- Profile Module Template -->
<div class="content-view profile-view" data-section="profile">
  <h1>Profile</h1>
  <p>Your account details and preferences.</p>

  <div class="profile-card">
    <div class="profile-hero">
      <img src="mukhako.jpg" class="profile-avatar" alt="" />
      <div class="profile-hero-text">
        <h2 id="profileDisplayName">User Name</h2>
        <p class="profile-email" id="profileDisplayEmail">user@example.com</p>
        <button type="button" class="btn-primary" id="profileEditBtn">
          <i class="fas fa-pen"></i> Edit Profile
        </button>
      </div>
    </div>
    <div class="profile-details">
      <h3 class="profile-details-title">Account Details</h3>
      <div class="profile-detail-row">
        <span class="profile-label">Role</span><span>Fleet Administrator</span>
      </div>
      <div class="profile-detail-row">
        <span class="profile-label">Department</span><span>Operations</span>
      </div>
      <div class="profile-detail-row">
        <span class="profile-label">Employee ID</span><span>EMP-0000</span>
      </div>
      <div class="profile-detail-row">
        <span class="profile-label">Phone</span
        ><span id="profileDisplayPhone">+63 000 000 0000</span>
      </div>
      <div class="profile-detail-row">
        <span class="profile-label">Join Date</span><span>Month 00, 0000</span>
      </div>
    </div>
  </div>
</div>
